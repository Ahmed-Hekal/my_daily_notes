<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self'; style-src 'self'">
  <title>Task Board Manager</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="header">
    <h1>Task Board Manager</h1>
  </div>

  <div class="main-container">
    <!-- Boards List View -->
    <div id="boardsList" class="boards-section">
      <div class="section-header">
        <h2>Your Boards</h2>
        <button class="btn" id="newBoardBtn">+ New Board</button>
      </div>
      <div id="boardsGrid" class="boards-grid"></div>
    </div>

    <!-- Board Detail View -->
    <div id="boardView" class="board-view">
      <div class="board-header">
        <div>
          <button class="btn btn-small" id="backToBoardsBtn">← Back to Boards</button>
          <h2 class="board-title" id="currentBoardTitle"></h2>
        </div>
        <div class="btn-group">
          <button class="btn btn-secondary" id="newTaskBtn">+ New Task</button>
          <button class="btn btn-danger btn-small" id="deleteBoardBtn">Delete Board</button>
        </div>
      </div>
      <div id="tasksGrid" class="tasks-grid"></div>
    </div>
  </div>

  <!-- Create Board Modal -->
  <div id="createBoardModal" class="modal">
    <div class="modal-content">
      <div class="modal-header">
        <h3>Create New Board</h3>
        <button class="close-btn" id="closeBoardModalBtn">&times;</button>
      </div>
      <form id="createBoardForm">
        <div class="form-group">
          <label for="boardTitle">Board Title</label>
          <input type="text" id="boardTitle" required>
        </div>
        <button type="submit" class="btn">Create Board</button>
      </form>
    </div>
  </div>

  <!-- Create Task Modal -->
  <div id="createTaskModal" class="modal">
    <div class="modal-content">
      <div class="modal-header">
        <h3>Create New Task</h3>
        <button class="close-btn" id="closeTaskModalBtn">&times;</button>
      </div>
      <form id="createTaskForm">
        <div class="form-group">
          <label for="taskTitle">Title</label>
          <input type="text" id="taskTitle" required>
        </div>
        <div class="form-group">
          <label for="taskPriority">Priority</label>
          <select id="taskPriority" required>
            <option value="low">Low</option>
            <option value="medium" selected>Medium</option>
            <option value="high">High</option>
          </select>
        </div>
        <div class="form-group">
          <label for="taskStatus">Status</label>
          <select id="taskStatus" required>
            <option value="todo" selected>To Do</option>
            <option value="in-progress">In Progress</option>
            <option value="completed">Completed</option>
          </select>
        </div>
        <div class="form-group">
          <label for="taskDescription">Description</label>
          <textarea id="taskDescription" required></textarea>
        </div>
        <button type="submit" class="btn">Create Task</button>
      </form>
    </div>
  </div>

  <script src="renderer.js"></script>
</body>
</html>
