<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self'">
  <title>My Daily Notes</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
      margin: 0;
      padding: 20px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .container {
      background: white;
      border-radius: 10px;
      padding: 40px;
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
      max-width: 600px;
      width: 100%;
    }

    h1 {
      color: #333;
      margin-top: 0;
      text-align: center;
    }

    p {
      color: #666;
      line-height: 1.6;
      text-align: center;
    }

    .info {
      background: #f0f0f0;
      padding: 15px;
      border-radius: 5px;
      margin-top: 20px;
    }

    .info strong {
      color: #667eea;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Welcome to My Daily Notes</h1>
    <p>This is a simple Electron desktop application.</p>
    
    <div class="info">
      <p><strong>Node Version:</strong> <span id="node-version"></span></p>
      <p><strong>Chrome Version:</strong> <span id="chrome-version"></span></p>
      <p><strong>Electron Version:</strong> <span id="electron-version"></span></p>
    </div>
  </div>

  <script src="renderer.js"></script>
</body>
</html>
